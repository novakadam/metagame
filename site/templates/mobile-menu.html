<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Mobile Menu — 3 szintű navigáció</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/mobile-menu.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body style="display:flex;gap:40px;flex-wrap:wrap;justify-content:center;align-items:flex-start;">

<!-- A mobil menu CSS @media (max-width: 1024px) alatt van,
     ezért preview-ban inline style-okkal mutatjuk a struktúrát.
     Éles használatban a BS offcanvas wrapper + a mobile-menu.css kezeli. -->

<div>
  <p class="template-label">Szint 1 — Kategóriák</p>
  <div style="width:360px;background:var(--color-bg);border:1px solid var(--color-border-muted);border-radius:8px;overflow:hidden;">
    <div class="list-group list-group-flush">
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3" style="padding:14px 20px;">
        <svg style="width:24px;height:24px;color:var(--color-gold);flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 3v18"/><path d="M16 3v18"/></svg>
        <span class="flex-grow-1">TCG</span>
        <svg style="width:20px;height:20px;color:var(--color-text-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3" style="padding:14px 20px;">
        <svg style="width:24px;height:24px;color:var(--color-gold);flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="8.5" cy="8.5" r="1"/><circle cx="15.5" cy="8.5" r="1"/><circle cx="12" cy="12" r="1"/></svg>
        <span class="flex-grow-1">Társasjáték</span>
        <svg style="width:20px;height:20px;color:var(--color-text-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3" style="padding:14px 20px;">
        <svg style="width:24px;height:24px;color:var(--color-gold);flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="flex-grow-1">Kiegészítők</span>
      </a>
    </div>
  </div>
</div>

<div>
  <p class="template-label">Szint 2 — Brandek (TCG)</p>
  <div style="width:360px;background:var(--color-bg);border:1px solid var(--color-border-muted);border-radius:8px;overflow:hidden;">
    <button class="btn d-flex align-items-center gap-2 w-100 p-3 fw-semibold" style="background:var(--color-bg-card);color:var(--color-gold);border-bottom:1px solid var(--color-gold);border-radius:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span>TCG</span>
    </button>
    <div class="list-group list-group-flush">
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3" style="padding:14px 20px;">
        <img src="../assets/brands/pokemon.png" alt="Pokémon" style="width:40px;height:24px;object-fit:contain;flex-shrink:0;">
        <span class="flex-grow-1">Pokémon</span>
        <svg style="width:20px;height:20px;color:var(--color-text-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3" style="padding:14px 20px;">
        <img src="../assets/brands/magic.png" alt="Magic" style="width:40px;height:24px;object-fit:contain;flex-shrink:0;">
        <span class="flex-grow-1">Magic: The Gathering</span>
        <svg style="width:20px;height:20px;color:var(--color-text-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
    </div>
  </div>
</div>

<div>
  <p class="template-label">Szint 3 — Alkategóriák (Pokémon)</p>
  <div style="width:360px;background:var(--color-bg);border:1px solid var(--color-border-muted);border-radius:8px;overflow:hidden;">
    <button class="btn d-flex align-items-center gap-2 w-100 p-3 fw-semibold" style="background:var(--color-bg-card);color:var(--color-gold);border-bottom:1px solid var(--color-gold);border-radius:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span>Pokémon</span>
    </button>
    <div class="list-group list-group-flush">
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Booster csomagok</a>
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Booster boxok</a>
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Displayek</a>
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Elite/Prémium dobozok</a>
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Deckek</a>
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Single kártyák</a>
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Kiegészítők</a>
      <a href="products.html" class="list-group-item list-group-item-action" style="padding:12px 20px;">Gyűjtői termékek</a>
    </div>
  </div>
</div>

</body>
</html>
