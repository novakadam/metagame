<!DOCTYPE html>

        <span class="flex-grow-1">TCG</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-4">

</div>

    <button class="btn d-flex align-items-center gap-2 w-100 p-3 fw-semibold preview-back-btn">

      <span>TCG</span>
    </button>
    <div class="list-group list-group-flush">
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-4">
        <img class="brand-logo" src="../assets/brands/pokemon.png" alt="Pokémon">

        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-4">
