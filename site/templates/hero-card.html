<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Hero Card + Ajánló</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/hero.css">
  <link rel="stylesheet" href="../css/components/product-card-ajanlo.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body class="preview-hero">

<div>
  <p class="template-label">Hero carousel card — event</p>
  <div class="mg-hero-card mg-hero-card--event" data-i="0">
    <div class="mg-hero-card__image">
      <img src="../assets/images/content - placeholder/events/hq720.jpg" alt="Friday Night Magic">
    </div>
    <div class="mg-hero-card__body">
      <p class="mg-hero-card__title">Friday Night Magic</p>
      <p class="mg-hero-card__meta">Péntek 18:00</p>
    </div>
  </div>
</div>

<div>
  <p class="template-label">Hero carousel card — product</p>
  <div class="mg-hero-card mg-hero-card--product" data-i="1">
    <div class="mg-hero-card__image">
      <img src="../assets/images/content - placeholder/product/magic-play-display.png" alt="Set One: Origins">
    </div>
    <div class="mg-hero-card__body">
      <p class="mg-hero-card__title">Set One: Origins</p>
      <p class="mg-hero-card__meta">12 358 Ft</p>
    </div>
  </div>
</div>

<div>
  <p class="template-label">Ajánló — product</p>
  <div class="preview-ajanlo">
    <div class="mg-ajanlo mg-ajanlo--product">
      <span class="badge badge-octagon position-absolute">új</span>
      <button class="btn btn-outline-secondary rounded-circle position-absolute" aria-label="Kedvenc">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <div class="mg-ajanlo__inner">
        <div class="mg-ajanlo__image">
          <img src="../assets/images/content - placeholder/product/magic-play-display.png" alt="Set One: Origins">
        </div>
        <div class="mg-ajanlo__info">
          <span class="badge badge-ribbon text-bg-primary">TCG</span>
          <h3 class="mg-ajanlo__title">Set One: Origins</h3>
          <p class="mg-ajanlo__subtitle">Kiemelt termék</p>
        </div>
        <div class="mg-ajanlo__details">
          <div class="mg-ajanlo__highlight">12 358 Ft</div>
          <div class="mg-ajanlo__rows">
            <div class="mg-ajanlo__row">
              <span class="mg-ajanlo__row-label">
                <svg class="mg-ajanlo__row-icon" viewBox="0 0 16 16" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3.5 3.5L13 5"/></svg>
                Üzlet
              </span>
              <span class="mg-ajanlo__row-value">10+</span>
            </div>
            <div class="mg-ajanlo__row">
              <span class="mg-ajanlo__row-label">
                <svg class="mg-ajanlo__row-icon" viewBox="0 0 16 16" fill="none" stroke="#FF4400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
                Klub
              </span>
              <span class="mg-ajanlo__row-value">0 db</span>
            </div>
          </div>
        </div>
      </div>
      <div class="mg-ajanlo__action">
        <a class="btn btn-primary" href="#">Kosárba</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
