<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Event Tooltip</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/event-calendar.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body style="display:flex;gap:40px;flex-wrap:wrap;justify-content:center;">

<div>
  <p class="template-label">Event tooltip — Magic</p>
  <div class="mg-event-tooltip card" style="width:280px;position:relative;opacity:1;pointer-events:auto;transform:none;">
    <div class="card-body p-3">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="p-1 rounded-circle flex-shrink-0" style="background:#1565C0;"></span>
        <strong style="font-size:15px;">Magic: Friday Night</strong>
      </div>
      <div class="d-flex flex-column gap-1" style="font-size:13px;">
        <div class="d-flex justify-content-between">
          <span style="color:var(--color-text-muted)">Időpont</span>
          <span>június 6. 18:00 – 22:00</span>
        </div>
        <div class="d-flex justify-content-between">
          <span style="color:var(--color-text-muted)">Részvételi díj</span>
          <span>1500 Ft</span>
        </div>
        <div class="d-flex justify-content-between">
          <span style="color:var(--color-text-muted)">Férőhely</span>
          <span>16/24</span>
        </div>
        <div class="d-flex justify-content-between">
          <span style="color:var(--color-text-muted)">Helyszín</span>
          <span>Kresz Géza utca</span>
        </div>
      </div>
      <div class="mt-3 text-center">
        <a class="btn btn-primary btn-sm" href="#">Jelentkezés</a>
      </div>
    </div>
  </div>
</div>

<div>
  <p class="template-label">Event tooltip — Pokémon</p>
  <div class="mg-event-tooltip card" style="width:280px;position:relative;opacity:1;pointer-events:auto;transform:none;">
    <div class="card-body p-3">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="p-1 rounded-circle flex-shrink-0" style="background:#E8A517;"></span>
        <strong style="font-size:15px;">Pokémon Liga Kupa</strong>
      </div>
      <div class="d-flex flex-column gap-1" style="font-size:13px;">
        <div class="d-flex justify-content-between">
          <span style="color:var(--color-text-muted)">Időpont</span>
          <span>június 7. 14:00 – 19:00</span>
        </div>
        <div class="d-flex justify-content-between">
          <span style="color:var(--color-text-muted)">Részvételi díj</span>
          <span>2000 Ft</span>
        </div>
        <div class="d-flex justify-content-between">
          <span style="color:var(--color-text-muted)">Férőhely</span>
          <span>32/32</span>
        </div>
      </div>
      <div class="mt-3 text-center">
        <a class="btn btn-primary btn-sm" href="#">Jelentkezés</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
