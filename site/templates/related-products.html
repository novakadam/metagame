<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Kapcsolódó termékek</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/related-products.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body style="display:flex;gap:40px;flex-wrap:wrap;justify-content:center;align-items:flex-start;">

<div style="width:320px;">
  <p class="template-label">Kapcsolódó termékek (sidebar)</p>

  <div class="d-flex flex-column gap-4">
    <h3 class="fs-4 fw-semibold" style="color:var(--color-text-muted)">Ehhez még jól jön:</h3>

    <!-- wicket:panel — fő termékkártya -->
    <div class="card mg-related__card d-flex flex-row flex-xxl-column">
      <!-- CUSTOM: gradient háttér — BS card-img-top nem tudja -->
      <div class="mg-related__card-image">
        <!-- wicket:src, wicket:alt -->
        <img src="../assets/images/content - placeholder/product/riftbound-deck-transparent.png" alt="Kapcsolódó termék">
      </div>
      <!-- BS: card-body, card-title, card-text -->
      <div class="card-body d-flex flex-column gap-3">
        <!-- wicket:text -->
        <p class="card-title fs-5">Kapcsolódó termék</p>
        <!-- wicket:text -->
        <p class="card-text small">Termék rövid leírása</p>
        <!-- wicket:text -->
        <p class="card-text fs-4 fw-semibold" style="color:var(--color-text-card)">2 500 Ft</p>
        <a href="#" class="btn btn-outline-secondary">Kosárba</a>
      </div>
    </div>

    <!-- wicket:repeater — upsell lista -->
    <div class="list-group list-group-flush d-flex flex-column gap-2">
      <div class="list-group-item d-flex align-items-center gap-3 p-3" style="border:1px solid var(--color-gold);border-radius:var(--radius-xs);cursor:pointer;">
        <!-- BS: btn rounded-circle -->
        <button class="btn btn-outline-secondary rounded-circle" aria-label="Kosárba">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>
        </button>
        <div class="flex-grow-1 min-w-0">
          <!-- wicket:text -->
          <span class="d-block small fw-medium" style="color:var(--color-text-card)">Sleeve</span>
          <!-- wicket:text -->
          <span class="d-block small" style="color:var(--color-text-muted)">Termék rövid leírása</span>
        </div>
        <!-- wicket:text -->
        <span class="small flex-shrink-0" style="color:var(--color-text-muted)">2 400 Ft</span>
      </div>
      <div class="list-group-item d-flex align-items-center gap-3 p-3" style="border:1px solid var(--color-gold);border-radius:var(--radius-xs);cursor:pointer;">
        <button class="btn btn-outline-secondary rounded-circle" aria-label="Kosárba">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>
        </button>
        <div class="flex-grow-1 min-w-0">
          <span class="d-block small fw-medium" style="color:var(--color-text-card)">Deck box</span>
          <span class="d-block small" style="color:var(--color-text-muted)">80+ kártya kapacitás</span>
        </div>
        <span class="small flex-shrink-0" style="color:var(--color-text-muted)">4 800 Ft</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
