<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Checkout — Rendelési tételek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/forms.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/checkout.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body class="preview-center">

<div class="preview-narrow">
  <p class="template-label">Checkout — rendelési összesítő</p>

  <!-- BS: list-group a tételekhez -->
  <ul class="list-group list-group-flush">

    <li class="list-group-item d-flex gap-3 py-3 px-0">
      <!-- CUSTOM: gradient háttér a termékkép mögé -->
      <div class="mg-checkout__item-img">
        <img src="../assets/images/content - placeholder/product/riftbound-deck-transparent.png" alt="Riftbound Deck">
        <!-- BS: badge -->
        <span class="badge text-bg-warning position-absolute top-0 start-0 m-1 fs-7">Még 3 db</span>
      </div>
      <div class="d-flex flex-column flex-grow-1 justify-content-between py-1" class="min-w-0">
        <div>
          <!-- BS: fw-medium, small, text-truncate -->
          <div class="fw-medium small text-truncate">Riftbound Deck</div>
          <div class="small text-muted text-truncate">Origins Champion Deck</div>
        </div>
        <div class="d-flex align-items-center justify-content-between">
          <!-- BS: input-group qty stepper -->
          <div class="input-group input-group-sm qty-stepper">
            <button class="btn btn-outline-secondary" type="button" disabled>−</button>
            <input type="number" class="form-control text-center" value="1" min="1">
            <button class="btn btn-outline-secondary" type="button">+</button>
          </div>
          <span class="fw-semibold text-gold">12 358 Ft</span>
        </div>
      </div>
    </li>

    <li class="list-group-item d-flex gap-3 py-3 px-0">
      <div class="mg-checkout__item-img">
        <img src="../assets/images/content - placeholder/product/riftbound-leag-booster-transparent.png" alt="Riftbound Booster">
      </div>
      <div class="d-flex flex-column flex-grow-1 justify-content-between py-1" class="min-w-0">
        <div>
          <div class="fw-medium small text-truncate">Riftbound Booster</div>
          <div class="small text-muted text-truncate">Origins Booster Display (24 pack)</div>
        </div>
        <div class="d-flex align-items-center justify-content-between">
          <div class="input-group input-group-sm qty-stepper">
            <button class="btn btn-outline-secondary" type="button">−</button>
            <input type="number" class="form-control text-center" value="2" min="1">
            <button class="btn btn-outline-secondary" type="button">+</button>
          </div>
          <span class="fw-semibold text-gold">25 600 Ft</span>
        </div>
      </div>
    </li>

  </ul>

  <!-- Összesítő — BS: d-flex, justify-content-between, hr -->
  <div class="p-4 mt-3 bg-muted-mg">
    <div class="d-flex justify-content-between small text-muted mb-3">
      <span>Részösszeg</span><span class="text-card">37 958 Ft</span>
    </div>
    <div class="d-flex justify-content-between small text-muted mb-3">
      <span>Szállítás</span><span class="text-success">Ingyenes</span>
    </div>
    <hr class="my-3" class="opacity-25">
    <div class="d-flex align-items-center justify-content-between">
      <span class="small text-muted">Végösszeg</span>
      <span class="fs-2 fw-bold text-gold font-monospace">37 958 Ft</span>
    </div>
  </div>
</div>

</body>
</html>
