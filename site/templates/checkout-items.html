<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Checkout — Rendelési tételek</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">

  <style>
    body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-body); padding: 40px; display: flex; justify-content: center; }
    .template-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-gold); margin-bottom: 12px; font-weight: 600; }

    /* BS THEME */
    .list-group-item { --bs-list-group-bg: transparent; --bs-list-group-border-color: var(--color-border-muted); --bs-list-group-color: var(--color-text); }
    .card-img-top.checkout-img { width: 80px; height: 80px; object-fit: contain; background: radial-gradient(circle, var(--color-bg) 0%, rgba(114, 10, 43, 0.25) 100%); border: 1px solid var(--color-border-muted); border-radius: var(--radius-xs); flex-shrink: 0; }
    .input-group-sm .form-control { background: var(--color-bg); border-color: var(--color-border-muted); color: var(--color-text); }
    .input-group-sm .btn { border-color: var(--color-border-muted); color: var(--color-gold); }
    .input-group-sm .btn:hover { background: var(--color-gold); color: var(--color-bg); border-color: var(--color-gold); }
  </style>
</head>
<body>

<div class="container" style="max-width: 420px;">
  <p class="template-label">Checkout — rendelési összesítő</p>

  <!-- BS: list-group -->
  <ul class="list-group list-group-flush">

    <li class="list-group-item d-flex gap-3 py-3">
      <!-- BS: card-img-top theme-mel (gradient) -->
      <img class="card-img-top checkout-img" src="../assets/images/content - placeholder/product/riftbound-deck-transparent.png" alt="Riftbound Deck">
      <div class="d-flex flex-column flex-grow-1 justify-content-between">
        <div>
          <div class="fw-medium" style="color:var(--color-text-card)">Riftbound Deck</div>
          <div class="small" style="color:var(--color-text-muted)">Origins Champion Deck</div>
          <!-- BS: badge -->
          <span class="badge text-bg-warning mt-1" style="font-size:11px;">Még 3 db</span>
        </div>
        <div class="d-flex align-items-center justify-content-between mt-2">
          <!-- BS: input-group — qty stepper -->
          <div class="input-group input-group-sm" style="width:100px;">
            <button class="btn btn-outline-secondary" type="button" disabled>−</button>
            <input type="number" class="form-control text-center" value="1" min="1" style="max-width:36px;">
            <button class="btn btn-outline-secondary" type="button">+</button>
          </div>
          <span class="fw-semibold">12 358 Ft</span>
        </div>
      </div>
    </li>

    <li class="list-group-item d-flex gap-3 py-3">
      <img class="card-img-top checkout-img" src="../assets/images/content - placeholder/product/riftbound-leag-booster-transparent.png" alt="Riftbound Booster">
      <div class="d-flex flex-column flex-grow-1 justify-content-between">
        <div>
          <div class="fw-medium" style="color:var(--color-text-card)">Riftbound Booster</div>
          <div class="small" style="color:var(--color-text-muted)">Origins Booster Display (24 pack)</div>
        </div>
        <div class="d-flex align-items-center justify-content-between mt-2">
          <div class="input-group input-group-sm" style="width:100px;">
            <button class="btn btn-outline-secondary" type="button">−</button>
            <input type="number" class="form-control text-center" value="2" min="1" style="max-width:36px;">
            <button class="btn btn-outline-secondary" type="button">+</button>
          </div>
          <span class="fw-semibold">25 600 Ft</span>
        </div>
      </div>
    </li>

  </ul>

  <!-- Összesítő — BS utility classes -->
  <div class="mt-4">
    <div class="d-flex justify-content-between mb-2" style="color:var(--color-text-muted)">
      <span>Részösszeg</span><span>37 958 Ft</span>
    </div>
    <div class="d-flex justify-content-between mb-2" style="color:var(--color-text-muted)">
      <span>Szállítás</span><span style="color:var(--color-gold)">Ingyenes</span>
    </div>
    <hr style="border-color:var(--color-border-muted)">
    <div class="d-flex justify-content-between">
      <span class="fw-semibold">Végösszeg</span>
      <span class="fw-bold" style="font-size:var(--font-size-xl)">37 958 Ft</span>
    </div>
  </div>

</div>

</body>
</html>
