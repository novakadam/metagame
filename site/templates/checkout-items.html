<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Checkout — Rendelési tételek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/forms.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/checkout.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body class="preview-center">

<div class="preview-narrow">
  <p class="template-label">Checkout — rendelési összesítő</p>

  <div class="mg-checkout__items">
    <div class="mg-checkout__item">
      <div class="mg-checkout__item-img">
        <img src="../assets/images/content - placeholder/product/riftbound-deck-transparent.png" alt="Riftbound Deck">
        <span class="mg-checkout__item-stock">Még 3 db</span>
      </div>
      <div class="mg-checkout__item-info">
        <div>
          <div class="mg-checkout__item-name">Riftbound Deck</div>
          <div class="mg-checkout__item-sub">Origins Champion Deck</div>
        </div>
        <div class="mg-checkout__item-bottom">
          <div class="input-group input-group-sm qty-stepper">
            <button class="btn btn-outline-secondary" type="button" disabled>−</button>
            <input type="number" class="form-control text-center" value="1" min="1">
            <button class="btn btn-outline-secondary" type="button">+</button>
          </div>
          <span class="mg-checkout__item-price">12 358 Ft</span>
        </div>
      </div>
    </div>
    <div class="mg-checkout__item">
      <div class="mg-checkout__item-img">
        <img src="../assets/images/content - placeholder/product/riftbound-leag-booster-transparent.png" alt="Riftbound Booster">
      </div>
      <div class="mg-checkout__item-info">
        <div>
          <div class="mg-checkout__item-name">Riftbound Booster</div>
          <div class="mg-checkout__item-sub">Origins Booster Display (24 pack)</div>
        </div>
        <div class="mg-checkout__item-bottom">
          <div class="input-group input-group-sm qty-stepper">
            <button class="btn btn-outline-secondary" type="button">−</button>
            <input type="number" class="form-control text-center" value="2" min="1">
            <button class="btn btn-outline-secondary" type="button">+</button>
          </div>
          <span class="mg-checkout__item-price">25 600 Ft</span>
        </div>
      </div>
    </div>
  </div>

  <div class="mg-checkout__totals mt-4">
    <div class="mg-checkout__totals-row"><span>Részösszeg</span><span>37 958 Ft</span></div>
    <div class="mg-checkout__totals-row"><span>Szállítás</span><span class="mg-checkout__totals-free">Ingyenes</span></div>
    <div class="mg-checkout__totals-divider"></div>
    <div class="mg-checkout__totals-final">
      <span class="mg-checkout__totals-final-label">Végösszeg</span>
      <span class="mg-checkout__totals-final-amount">37 958 Ft</span>
    </div>
  </div>
</div>

</body>
</html>
