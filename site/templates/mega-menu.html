<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Mega Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/mega-menu.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body>

<p class="template-label">Mega menu — TCG kategória (teljes)</p>

<div class="mg-megamenu preview-menu">
  <div class="mg-megamenu__brands">
    <div class="mg-megamenu__brand is-active" data-brand="Pokémon">
      <img class="mg-megamenu__brand-logo" src="../assets/brands/pokemon.png" alt="Pokémon">
      <span class="mg-megamenu__brand-name">Pokémon</span>
      <span class="mg-megamenu__brand-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></span>
    </div>
    <div class="mg-megamenu__brand" data-brand="Magic: The Gathering">
      <img class="mg-megamenu__brand-logo" src="../assets/brands/magic.png" alt="Magic: The Gathering">
      <span class="mg-megamenu__brand-name">Magic: The Gathering</span>
      <span class="mg-megamenu__brand-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></span>
    </div>
    <div class="mg-megamenu__brand" data-brand="Yu-Gi-Oh!">
      <img class="mg-megamenu__brand-logo" src="../assets/brands/yugioh.png" alt="Yu-Gi-Oh!">
      <span class="mg-megamenu__brand-name">Yu-Gi-Oh!</span>
      <span class="mg-megamenu__brand-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></span>
    </div>
  </div>
  <div class="mg-megamenu__right">
    <div class="mg-megamenu__subcats">
      <h3 class="mg-megamenu__subcats-title">ALKATEGÓRIÁK</h3>
      <div class="mg-megamenu__subcats-list">
        <a href="#">Booster csomagok</a>
        <a href="#">Booster boxok</a>
        <a href="#">Displayek</a>
        <a href="#">Elite/Prémium dobozok</a>
        <a href="#">Deckek</a>
        <a href="#">Single kártyák</a>
        <a href="#">Kiegészítők</a>
      </div>
    </div>
    <div class="mg-megamenu__popular">
      <h3 class="mg-megamenu__popular-title">LEGNÉPSZERŰBB</h3>
      <a class="mg-megamenu__product-card" href="#">
        <div class="mg-megamenu__product-img"><img src="../assets/images/content - placeholder/product/magic-play-display-transparent.png" alt="Magic Play Display"></div>
        <div class="mg-megamenu__product-info">
          <span class="mg-megamenu__product-name">Magic Play Display</span>
          <span class="mg-megamenu__product-price">2 500 Ft</span>
        </div>
      </a>
      <a class="mg-megamenu__product-card" href="#">
        <div class="mg-megamenu__product-img"><img src="../assets/images/content - placeholder/product/riftbound-leag-booster-transparent.png" alt="Riftbound Booster"></div>
        <div class="mg-megamenu__product-info">
          <span class="mg-megamenu__product-name">Riftbound Booster</span>
          <span class="mg-megamenu__product-price">3 990 Ft</span>
        </div>
      </a>
    </div>
  </div>
</div>

</body>
</html>
