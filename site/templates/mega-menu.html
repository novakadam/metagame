<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Mega Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/mega-menu.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body>

<p class="template-label">Mega menu — TCG kategória (teljes)</p>

<!-- CUSTOM: mg-megamenu struktúra — 3 oszlopos sliding panel, nincs BS megfelelő -->
<div class="mg-megamenu preview-menu">

  <!-- Brand lista -->
  <div class="mg-megamenu__brands">
    <div class="mg-megamenu__brand is-active" data-brand="Pokémon">
      <img class="brand-logo" src="../assets/brands/pokemon.png" alt="Pokémon">
      <span class="flex-grow-1 fw-semibold">Pokémon</span>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="mg-megamenu__brand" data-brand="Magic: The Gathering">
      <img class="brand-logo" src="../assets/brands/magic.png" alt="Magic: The Gathering">
      <span class="flex-grow-1">Magic: The Gathering</span>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="mg-megamenu__brand" data-brand="Yu-Gi-Oh!">
      <img class="brand-logo" src="../assets/brands/yugioh.png" alt="Yu-Gi-Oh!">
      <span class="flex-grow-1">Yu-Gi-Oh!</span>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>

  <!-- Jobb oldal -->
  <div class="mg-megamenu__right">

    <!-- Alkategóriák -->
    <div class="mg-megamenu__subcats">
      <h6 class="fw-bold text-uppercase mb-4">Alkategóriák</h6>
      <nav class="nav flex-column gap-3">
        <a class="nav-link p-0" href="#">Booster csomagok</a>
        <a class="nav-link p-0" href="#">Booster boxok</a>
        <a class="nav-link p-0" href="#">Displayek</a>
        <a class="nav-link p-0" href="#">Elite/Prémium dobozok</a>
        <a class="nav-link p-0" href="#">Deckek</a>
        <a class="nav-link p-0" href="#">Single kártyák</a>
        <a class="nav-link p-0" href="#">Kiegészítők</a>
      </nav>
    </div>

    <!-- Népszerű termékek -->
    <div class="mg-megamenu__popular">
      <h6 class="fw-bold text-uppercase mb-4">Legnépszerűbb</h6>
      <a class="mg-megamenu__product-card text-decoration-none" href="#">
        <div class="mg-megamenu__product-img"><img src="../assets/images/content - placeholder/product/magic-play-display-transparent.png" alt="Magic Play Display"></div>
        <div>
          <span class="d-block">Magic Play Display</span>
          <span class="d-block fs-5 fw-semibold">2 500 Ft</span>
        </div>
      </a>
      <a class="mg-megamenu__product-card text-decoration-none" href="#">
        <div class="mg-megamenu__product-img"><img src="../assets/images/content - placeholder/product/riftbound-leag-booster-transparent.png" alt="Riftbound Booster"></div>
        <div>
          <span class="d-block">Riftbound Booster</span>
          <span class="d-block fs-5 fw-semibold">3 990 Ft</span>
        </div>
      </a>
    </div>

  </div>
</div>

</body>
</html>
