<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template: Keresési találatok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/theme-bs.css">
  <link rel="stylesheet" href="../css/components/search-overlay.css">
  <link rel="stylesheet" href="preview.css">
</head>
<body class="preview-row">

<div class="preview-search">
  <p class="template-label">Desktop keresés — találati lista</p>
  <div class="mg-search-panel__results">
    <div class="mg-search-panel__group">
      <h3 class="mg-search-panel__group-title">Gyűjtögetős kártyajátékok</h3>
      <div class="mg-search-panel__items">
        <a href="product.html" class="mg-search-panel__item">
          <div class="mg-search-panel__item-img"><img src="../assets/images/content - placeholder/product/riftbound-leag-booster-transparent.png" alt="Riftbound"></div>
          <div class="mg-search-panel__item-info">
            <span class="mg-search-panel__item-name"><mark>Riftbound</mark>: LoL TCG Booster Display</span>
            <span class="mg-search-panel__item-sub">Unleashed – 24 pack</span>
          </div>
          <span class="mg-search-panel__item-stock">Még 3 db</span>
          <span class="mg-search-panel__item-price">12 800 Ft</span>
        </a>
        <a href="product.html" class="mg-search-panel__item">
          <div class="mg-search-panel__item-img"><img src="../assets/images/content - placeholder/product/riftbound-deck-transparent.png" alt="Riftbound"></div>
          <div class="mg-search-panel__item-info">
            <span class="mg-search-panel__item-name"><mark>Riftbound</mark> Champion Deck</span>
            <span class="mg-search-panel__item-sub">Origins Champion Deck</span>
          </div>
          <span class="mg-search-panel__item-price">12 358 Ft</span>
        </a>
      </div>
    </div>
    <div class="search-footer d-flex justify-content-between align-items-center">
      <span class="small text-muted">2 találat</span>
      <a href="products.html" class="small text-gold text-decoration-none">Összes találat →</a>
    </div>
  </div>
</div>

</body>
</html>
