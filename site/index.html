<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metagame</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Design tokenek -->
  <link rel="stylesheet" href="css/tokens.css">

  <!-- Komponensek -->
  <link rel="stylesheet" href="css/components/frame.css">
</head>
<body>

<div class="mg-frame">

  <!-- ── KERET SVG elemek ────────────────────────────────────────── -->
  <!-- Sarokdíszek: fix méret, nem nyúlnak -->
  <img class="mg-frame-corner mg-frame-corner--tl" src="../assets/frame/frame-corner-tl.svg" alt="">
  <img class="mg-frame-corner mg-frame-corner--tr" src="../assets/frame/frame-corner-tr.svg" alt="">
  <img class="mg-frame-corner mg-frame-corner--bl" src="../assets/frame/frame-corner-bl.svg" alt="">
  <img class="mg-frame-corner mg-frame-corner--br" src="../assets/frame/frame-corner-br.svg" alt="">

  <!-- Vonalak: div konténer pozicionálja, img belül 100%×100%-on tölti ki -->
  <div class="mg-frame-line mg-frame-line--top"><img src="../assets/frame/frame-line-top.svg" alt="" style="display:block; width:100%; height:100%; object-fit:fill;"></div>
  <div class="mg-frame-line mg-frame-line--left"><img src="../assets/frame/frame-line-left.svg" alt="" style="display:block; width:100%; height:100%; object-fit:fill;"></div>
  <div class="mg-frame-line mg-frame-line--right-bottom"><img src="../assets/frame/frame-right-bottom.svg" alt="" style="display:block; width:100%; height:100%; object-fit:fill;"></div>
  <div class="mg-frame-line mg-frame-line--bottom"><img src="../assets/frame/frame-line-bottom.svg" alt="" style="display:block; width:100%; height:100%; object-fit:fill;"></div>

  <!-- ── TOP BAR ────────────────────────────────────────────────── -->
  <header class="mg-topbar">
    <img class="mg-logo" src="../assets/images/logo.svg" alt="Metagame">

    <!-- Toggle + keresősor: 50px-re a lap tetejétől -->
    <div class="mg-topbar-row">
      <nav class="mg-toggle">
        <button class="mg-toggle__btn mg-toggle__btn--active" data-target="shop">Shop</button>
        <button class="mg-toggle__btn" data-target="community">Közösség</button>
      </nav>

      <div class="mg-search">
        <input type="text" placeholder="Search here...">
        <button class="mg-search__btn" aria-label="Keresés">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── BAL NAV ────────────────────────────────────────────────── -->
  <nav class="mg-nav-left" id="mg-nav-left">

    <!-- Shop nézet (alapértelmezett) -->
    <!-- BACKEND: kategóriák dinamikusan töltődnek -->
    <div class="mg-nav-section" data-nav="shop">
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__icon"><!-- ikon placeholder --></span>
        <span class="mg-nav-item__label">TCG</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__icon"><!-- ikon placeholder --></span>
        <span class="mg-nav-item__label">Társasjáték</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__icon"><!-- ikon placeholder --></span>
        <span class="mg-nav-item__label">Gyűjthető kártya</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__icon"><!-- ikon placeholder --></span>
        <span class="mg-nav-item__label">Kiegészítők</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__icon"><!-- ikon placeholder --></span>
        <span class="mg-nav-item__label">Szerepjátékok</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__icon"><!-- ikon placeholder --></span>
        <span class="mg-nav-item__label">Wargame</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__icon"><!-- ikon placeholder --></span>
        <span class="mg-nav-item__label">Modellezés</span>
      </a>
    </div>

    <!-- Közösség nézet (toggle után) -->
    <div class="mg-nav-section mg-nav-section--hidden" data-nav="community">
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__label">Események</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__label">Krónikák</span>
      </a>
      <a class="mg-nav-item" href="#">
        <span class="mg-nav-item__label">Közösség</span>
      </a>
    </div>

  </nav>

  <div class="mg-frame-line mg-frame-line--right-top"><img src="../assets/frame/frame-right-top.svg" alt="" style="display:block; width:100%; height:100%; object-fit:fill;"></div>

  <!-- ── JOBB NAV ───────────────────────────────────────────────── -->
  <aside class="mg-nav-right">
    <button class="mg-nav-right__btn" aria-label="Profil">
      <div class="mg-nav-right__btn-inner">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </button>
    <button class="mg-nav-right__btn" aria-label="Kedvencek">
      <div class="mg-nav-right__btn-inner">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 16.5S2 11.5 2 6.5A4 4 0 0 1 10 4.5a4 4 0 0 1 8 2c0 5-8 10-8 10z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
    </button>
    <!-- BACKEND: cart.count – badge megjelenítés ha > 0 -->
    <button class="mg-nav-right__btn mg-nav-right__btn--cart" aria-label="Kosár">
      <div class="mg-nav-right__btn-inner">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M2 2h2l2.5 10h9l2-7H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="9" cy="16" r="1.5" fill="currentColor"/>
          <circle cx="14" cy="16" r="1.5" fill="currentColor"/>
        </svg>
        <!-- BACKEND: cart.count -->
        <span class="mg-cart-badge" style="display:none">0</span>
      </div>
    </button>
    <button class="mg-nav-right__btn" aria-label="Értesítések">
      <div class="mg-nav-right__btn-inner">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2a6 6 0 0 0-6 6v4l-2 2h16l-2-2V8a6 6 0 0 0-6-6z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 16a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
    </button>
    <button class="mg-nav-right__btn" aria-label="Helyszín">
      <div class="mg-nav-right__btn-inner">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M10 2a6 6 0 0 0-6 6c0 4 6 10 6 10s6-6 6-10a6 6 0 0 0-6-6z" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="10" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
    </button>
    <button class="mg-nav-right__btn" aria-label="Telefon">
      <div class="mg-nav-right__btn-inner">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M4 2h4l2 4-2 2a10 10 0 0 0 4 4l2-2 4 2v4a2 2 0 0 1-2 2A16 16 0 0 1 2 4a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
    </button>
  </aside>

  <!-- ── TARTALOM ────────────────────────────────────────────────── -->
  <!-- BACKEND: oldal tartalom ide kerül JSP-ből -->
  <main class="mg-content">
    <p style="color: var(--color-text); padding: 2rem;">Tartalom placeholder</p>
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────────── -->
  <!-- BACKEND: footer adatok -->
  <footer class="mg-footer">
    <div class="mg-footer__left">
      <span>© metagame 2026</span>
      <span>1132 Budapest, Kádár utca 10.</span>
      <span>H–SZ 10–18</span>
    </div>
    <div class="mg-footer__right">
      <a href="#">ÁSZF</a>
      <a href="#">Adatvédelem</a>
      <a href="#">Információ</a>
    </div>
  </footer>

</div><!-- /.mg-frame -->

<!-- jQuery -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Frame widget -->
<script src="js/components/frame.js"></script>

</body>
</html>
